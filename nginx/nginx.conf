# ── Mini EDC — Nginx Reverse Proxy ───────────────────────────────────────────
# Routes:
#   /api/*       → FastAPI  (port 8000)
#   /docs        → FastAPI Swagger UI
#   /redoc       → FastAPI ReDoc
#   /*           → Streamlit dashboard (port 8501)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream api_backend {
        server api:8000;
    }

    upstream dashboard_backend {
        server dashboard:8501;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # API routes
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Swagger UI
        location /docs {
            proxy_pass http://api_backend/docs;
            proxy_set_header Host $host;
        }

        # ReDoc
        location /redoc {
            proxy_pass http://api_backend/redoc;
            proxy_set_header Host $host;
        }

        # OpenAPI spec
        location /openapi.json {
            proxy_pass http://api_backend/openapi.json;
            proxy_set_header Host $host;
        }

        # Health check (direct to API)
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
        }

        # Streamlit dashboard (WebSocket support required)
        location / {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
